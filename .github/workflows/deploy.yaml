# Build the shinylive (WebAssembly) Palette Lab and deploy it to GitHub Pages.
# The app runs entirely in the browser via webR — there is no Shiny server.
# Hosted at: https://viniciusoike.github.io/ekioplot-palette-lab/
#
# Uses GitHub's native Pages deployment, so the repo's Pages source must be set
# to "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).
name: deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # The app's runtime packages. shinylive reads each one's DESCRIPTION to
      # resolve its WebAssembly build from https://repo.r-wasm.org.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shinylive
            any::shiny
            any::bslib
            any::ggplot2
            any::dplyr
            any::forcats
            any::stringr
            any::tibble
            any::ggbump
            any::patchwork
            any::colorspace
            any::colourpicker

      # Install ekioplot from r-universe so its DESCRIPTION carries the
      # `Repository:` field shinylive needs to fetch the matching WebAssembly
      # binary. (r-universe auto-builds the WASM binary from the GitHub repo.)
      - name: Install ekioplot from r-universe (for the WASM binary reference)
        run: |
          install.packages(
            "ekioplot",
            repos = c("https://viniciusoike.r-universe.dev", "https://cloud.r-project.org")
          )
        shell: Rscript {0}

      - name: Build Palette Lab (shinylive)
        run: shinylive::export(".", "_site")
        shell: Rscript {0}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
